name: Sync A1 Fence repos
on:
  workflow_dispatch:

jobs:
  sync-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cursor/a1-fence-live-aa57
      - name: Push website to a1-fence
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Add REPO_SYNC_TOKEN (GitHub PAT with repo access) in repo Secrets, then re-run."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add fence "https://x-access-token:${GH_TOKEN}@github.com/msimpson215/a1-fence.git"
          git push fence HEAD:main --force

  sync-voice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: cursor/a1-fence-voxtalk-aa57
      - name: Push voice to a1-fence-voxtalk
        env:
          GH_TOKEN: ${{ secrets.REPO_SYNC_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "Add REPO_SYNC_TOKEN (GitHub PAT with repo access) in repo Secrets, then re-run."
            exit 1
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add voice "https://x-access-token:${GH_TOKEN}@github.com/msimpson215/a1-fence-voxtalk.git"
          git push voice HEAD:main --force
