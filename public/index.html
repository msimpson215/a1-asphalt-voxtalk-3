<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A1 Asphalt & Sealing</title>

  <style>
    :root{
      --bg1:#252525;
      --bg2:#000000;
      --yellow:#F5C518;
      --muted: rgba(245,197,24,0.70);
      --muted2: rgba(245,197,24,0.45);
      --stroke: rgba(245,197,24,0.22);
      --panel: rgba(0,0,0,0.25);
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--yellow);
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 300;
      overflow: hidden;
      user-select: none;
    }

    #overlay{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    #panel{
      width: min(460px, calc(100vw - 44px));
      border-radius: 18px;
      padding: 18px 18px 14px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    #headline {
      font-size: 0.98rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--muted);
      padding: 0 6px;
      min-height: 2.4em;
      display: grid;
      place-items: center;
    }
    .hide-soft { visibility: hidden; }

    #orb-container {
      width: 220px;
      height: 220px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: url('/images/A1__asphalt_logo.jpeg') center / 70% no-repeat;
      background-color: #111;
      border: 3px solid var(--yellow);
      box-shadow:
        0 0 60px rgba(245, 197, 24, 0.4),
        0 0 120px rgba(245, 197, 24, 0.15),
        0 0 200px rgba(245, 197, 24, 0.08);
      transform: scale(1);
      animation: orbPulse 3s ease-in-out infinite;
      transition: transform 260ms ease, box-shadow 260ms ease, border-color 260ms ease;
    }

    #orb-container:hover .orb {
      transform: scale(1.03);
    }

    body.active .orb {
      animation: orbActive 1.35s infinite alternate ease-in-out;
    }

    @keyframes orbPulse {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 0 60px rgba(245, 197, 24, 0.4),
          0 0 120px rgba(245, 197, 24, 0.15),
          0 0 200px rgba(245, 197, 24, 0.08);
        border-color: var(--yellow);
      }
      50% {
        transform: scale(1.05);
        box-shadow:
          0 0 80px rgba(245, 197, 24, 0.6),
          0 0 160px rgba(245, 197, 24, 0.25),
          0 0 260px rgba(245, 197, 24, 0.12);
        border-color: #fff;
      }
    }

    @keyframes orbActive {
      0% {
        transform: scale(1.05);
        box-shadow:
          0 0 80px rgba(245, 197, 24, 0.6),
          0 0 160px rgba(245, 197, 24, 0.25),
          0 0 260px rgba(245, 197, 24, 0.12);
        border-color: #fff;
      }
      100% {
        transform: scale(1.1);
        box-shadow:
          0 0 100px rgba(245, 197, 24, 0.8),
          0 0 200px rgba(245, 197, 24, 0.35),
          0 0 300px rgba(245, 197, 24, 0.15);
        border-color: var(--yellow);
      }
    }

    #status-text{
      font-size: 0.86rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--yellow);
      opacity: 0.90;
      min-height: 1.2em;
    }

    #hint{
      font-size: 0.82rem;
      color: var(--muted2);
      text-align: center;
      line-height: 1.2;
      min-height: 1.1em;
      margin-top: -2px;
    }

    #footer {
      text-align: center;
      opacity: 0.60;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.2;
      margin-top: 2px;
    }

    #footer .brand { font-size: 0.82rem; }
    #footer .phone { font-size: 0.78rem; opacity: 0.9; margin-top: 4px; }

    body.starting #orb-container { pointer-events: none; opacity: 0.95; }

    /* Embedded in the main A1 website iframe: no second box or black backdrop */
    body.embedded {
      background: transparent;
    }

    body.embedded #overlay {
      padding: 0;
      background: transparent;
      pointer-events: none;
    }

    body.embedded #panel {
      width: auto;
      padding: 0;
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      pointer-events: auto;
    }

    body.embedded #headline,
    body.embedded #footer {
      display: none;
    }

    body.embedded #orb-container {
      width: 260px;
      height: 260px;
    }

    body.embedded #hint {
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 16px;
    }

    body.embedded.idle #hint,
    body.embedded.starting #status-text {
      display: none;
    }
  </style>
</head>

<body class="idle">
  <div id="overlay">
    <div id="panel">
      <div id="headline">Click to Start a Conversation</div>

      <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
      </div>

      <div id="status-text"></div>
      <div id="hint">Click outside this box to return to the website</div>

      <div id="footer">
        <div class="brand">A1 Asphalt &amp; Sealing</div>
        <div class="phone">(618) 929-3301</div>
      </div>
    </div>
  </div>

  <script>
    let pc = null
    let localStream = null
    let starting = false
    let embedStarted = false

    const isEmbedded = window.self !== window.top
    const statusEl = document.getElementById('status-text')
    const headlineEl = document.getElementById('headline')
    const hintEl = document.getElementById('hint')

    function setBodyState(state) {
      document.body.className = isEmbedded ? `${state} embedded` : state
    }

    function setIdle(){
      setBodyState('idle')
      statusEl.textContent = ''
      headlineEl.classList.remove('hide-soft')
      hintEl.textContent = isEmbedded ? '' : 'Click outside this box to return to the website'
      starting = false
    }

    function setStarting(){
      setBodyState('starting')
      statusEl.textContent = isEmbedded ? '' : 'STARTING…'
      headlineEl.classList.remove('hide-soft')
      hintEl.textContent = isEmbedded ? '' : 'Click outside this box to return to the website'
    }

    function setActive(){
      setBodyState('active')
      statusEl.textContent = ''
      headlineEl.classList.add('hide-soft')
      hintEl.textContent = isEmbedded ? 'Click orb to end' : 'Click orb to end'
    }

    async function hardStop(){
      try{
        if (pc) { try { pc.close() } catch {} pc = null }
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch {}
          localStream = null
        }
      } finally {
        setIdle()
      }
    }

    document.getElementById('overlay').addEventListener('click', async (e) => {
      if (isEmbedded) return
      if (e.target.id !== 'overlay') return
      await hardStop()
      try { window.parent.postMessage({ type: 'voxtalk-close' }, '*') } catch {}
      try { window.close() } catch {}
      try { history.back() } catch {}
    })

    async function toggleAssistant(){
      if (pc || starting) {
        await hardStop()
        return
      }

      starting = true
      setStarting()

      try {
        pc = new RTCPeerConnection()

        const audio = document.createElement('audio')
        audio.autoplay = true

        pc.ontrack = (e) => {
          if (audio.srcObject !== e.streams[0]) {
            audio.srcObject = e.streams[0]
          }
        }

        const dc = pc.createDataChannel('oai-events')
        dc.addEventListener('open', () => {
          dc.send(JSON.stringify({
            type: 'response.create',
            response: {
              input: [],
              instructions: 'Say exactly once: "Hello, welcome to A1 Professional Asphalt and Sealing. I am an AI team member here to answer all your questions. What can I do for you?"'
            }
          }))
        })

        localStream = await navigator.mediaDevices.getUserMedia({ audio: true })
        pc.addTrack(localStream.getTracks()[0])

        const offer = await pc.createOffer()
        await pc.setLocalDescription(offer)

        const sdpResponse = await fetch('/session', {
          method: 'POST',
          body: offer.sdp,
          headers: {
            'Content-Type': 'application/sdp'
          }
        })

        if (!sdpResponse.ok) {
          throw new Error(await sdpResponse.text())
        }

        const answer = { type: 'answer', sdp: await sdpResponse.text() }
        await pc.setRemoteDescription(answer)

        setActive()
      } catch (err) {
        console.error(err)
        pc = null
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()) } catch {}
          localStream = null
        }
        setBodyState('idle')
        statusEl.textContent = isEmbedded ? '' : 'ERROR'
        starting = false
        headlineEl.classList.remove('hide-soft')
        hintEl.textContent = isEmbedded ? '' : 'Click outside this box to return to the website'
      }
    }

    function startWhenVisible() {
      if (embedStarted || pc || starting) return
      embedStarted = true
      toggleAssistant()
    }

    function waitUntilVisible(callback) {
      function check() {
        if (document.body.offsetWidth > 0 && document.body.offsetHeight > 0) {
          callback()
        } else {
          requestAnimationFrame(check)
        }
      }
      check()
    }

    if (isEmbedded) {
      setBodyState('idle')
      waitUntilVisible(startWhenVisible)

      window.addEventListener('message', (e) => {
        if (e.data?.type === 'voxtalk-start') startWhenVisible()
      })
    } else {
      setIdle()
    }
  </script>
</body>
</html>
