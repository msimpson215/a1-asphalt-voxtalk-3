<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Asphalt - AI Assistant</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a1a; 
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #status-text {
            margin-bottom: 50px;
            font-size: 1.2rem;
            letter-spacing: 3px;
            font-weight: 400;
            color: #ffcc00; 
            text-transform: uppercase;
        }

        #orb-container {
            position: relative;
            width: 240px;
            height: 240px;
            cursor: pointer;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffcc00;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.6);
            z-index: 2;
        }

        /* Breathing only when speaking */
        body.speaking .orb {
            animation: sun-breathe 2.5s infinite ease-in-out;
        }

        @keyframes sun-breathe {
            0%, 100% { transform: scale(1); box-shadow: 0 0 40px rgba(255, 204, 0, 0.6); }
            50% { transform: scale(1.1); box-shadow: 0 0 70px rgba(255, 204, 0, 0.9); }
        }

        #branding-footer {
            position: absolute;
            bottom: 30px; 
            width: 100%;
            font-size: 1rem;
            color: #ffcc00;
            opacity: 0.7;
            text-align: center;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="initRealtime()">
        <div class="orb"></div>
    </div>

    <div id="branding-footer">A1 PROFESSIONAL ASPHALT & SEALING LLC</div>

    <script>
        let pc;

        function setMode(mode) {
            document.body.className = mode; 
            const statusLabel = document.getElementById('status-text');
            if (mode === 'listening') statusLabel.textContent = "I'M LISTENING...";
            else if (mode === 'speaking') statusLabel.textContent = "TEAM MEMBER SPEAKING";
            else statusLabel.textContent = "TALK TO OUR AI TEAM MEMBER";
        }

        async function initRealtime() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setMode('listening');

                const tokenResponse = await fetch("/session");
                const data = await tokenResponse.json();
                const EPHEMERAL_KEY = data.client_secret.value;

                pc = new RTCPeerConnection();
                const audioEl = document.createElement("audio");
                audioEl.autoplay = true;
                pc.ontrack = e => audioEl.srcObject = e.streams[0];
                pc.addTrack(stream.getTracks()[0]);

                const dc = pc.createDataChannel("oai-events");
                dc.addEventListener("message", (e) => {
                    const event = JSON.parse(e.data);
                    if (event.type === "response.audio.delta") setMode('speaking');
                    if (event.type === "response.audio.done") setMode('listening');
                });

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpResponse = await fetch("https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17", {
                    method: "POST",
                    body: offer.sdp,
                    headers: {
                        Authorization: `Bearer ${EPHEMERAL_KEY}`,
                        "Content-Type": "application/sdp",
                    },
                });

                const answer = { type: "answer", sdp: await sdpResponse.text() };
                await pc.setRemoteDescription(answer);
                
            } catch (err) {
                console.error(err);
                document.getElementById('status-text').textContent = "CONNECTION ERROR";
            }
        }
    </script>
</body>
</html>
