<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A1 Brain</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
            height: 100vh;
            /* Asphalt Depth: Lighter center fading to true black edges */
            background: radial-gradient(circle, #252525 0%, #000000 100%); 
            color: #ffcc00; /* Traffic Yellow */
            font-family: 'Impact', 'Arial Narrow Bold', sans-serif; /* FONT IS HERE */
            overflow: hidden;
        }

        #status-text {
            font-size: 2.2rem; /* SIZE IS HERE - Make smaller if needed */
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #orb-container {
            width: 220px;
            height: 220px;
            cursor: pointer;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #ffcc00;
            box-shadow: 0 0 60px rgba(255, 204, 0, 0.8);
        }

        body.active .orb {
            animation: pulse 1.2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        #footer-brand {
            font-size: 1.2rem; /* FOOTER SIZE IS HERE */
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>
    <div id="orb-container" onclick="startAssistant()">
        <div class="orb"></div>
    </div>
    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        let isStarted = false; // STOPS THE ECHO

        async function startAssistant() {
            if (isStarted) return; 
            isStarted = true;

            document.body.className = 'active';
            document.getElementById('status-text').textContent = "LISTENING...";

            try {
                const r = await fetch('/session');
                const data = await r.json();
                
                const pc = new RTCPeerConnection();
                const audio = document.createElement("audio");
                audio.autoplay = true;
                
                pc.ontrack = e => {
                    if (audio.srcObject !== e.streams[0]) {
                        audio.srcObject = e.streams[0];
                    }
                };

                const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(ms.getTracks()[0]);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
                    method: "POST",
                    body: offer.sdp,
                    headers: { 
                        Authorization: `Bearer ${data.client_secret.value}`, 
                        "Content-Type": "application/sdp" 
                    }
                });

                const answer = { type: "answer", sdp: await sdpResponse.text() };
                await pc.setRemoteDescription(answer);

            } catch (err) {
                isStarted = false;
                document.getElementById('status-text').textContent = "ERROR";
            }
        }
    </script>
</body>
</html>
