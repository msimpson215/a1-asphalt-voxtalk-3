<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A1 Brain</title>

  <style>
    :root{
      --bg1:#252525;
      --bg2:#000000;
      --yellow:#FED100;
      --muted: rgba(254,209,0,0.70);
      --muted2: rgba(254,209,0,0.45);
      --stroke: rgba(254,209,0,0.22);
      --panel: rgba(0,0,0,0.25);
    }

    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle, var(--bg1) 0%, var(--bg2) 100%);
      color: var(--yellow);
      font-family: "Arial Narrow", Arial, sans-serif;
      font-weight: 300;
      overflow: hidden;
      user-select: none;
    }

    /* Click-outside overlay */
    #overlay{
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
    }

    /* small focused box */
    #panel{
      width: min(440px, calc(100vw - 44px));
      border-radius: 18px;
      padding: 18px 18px 14px;
      background: var(--panel);
      border: 1px solid var(--stroke);
      backdrop-filter: blur(6px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    /* small headline, orb is focus */
    #headline {
      font-size: 0.98rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--muted);
      padding: 0 6px;
    }

    /* make LISTENING small */
    #status-text{
      font-size: 0.90rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.2;
      color: var(--yellow);
      opacity: 0.90;
      min-height: 1.2em;
    }

    #hint{
      font-size: 0.85rem;
      color: var(--muted2);
      text-align: center;
      line-height: 1.2;
      margin-top: -2px;
    }

    /* orb (slightly smaller) */
    #orb-container {
      width: 190px;
      height: 190px;
      cursor: pointer;
      display: grid;
      place-items: center;
    }

    .orb {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background-color: var(--yellow);
      box-shadow: 0 0 58px rgba(254, 209, 0, 0.78);
      transform: scale(1);
      transition: transform 260ms ease, box-shadow 260ms ease, filter 260ms ease;
      will-change: transform, box-shadow;
    }

    #orb-container:hover .orb{
      transform: scale(1.03);
      box-shadow: 0 0 75px rgba(254,209,0,0.9);
    }

    /* wake + pulse */
    body.active .orb {
      transform: scale(1.12);
      box-shadow: 0 0 100px rgba(254, 209, 0, 1);
      animation: pulse 1.35s infinite alternate ease-in-out;
    }

    @keyframes pulse {
      0%   { transform: scale(1.08); box-shadow: 0 0 68px rgba(254,209,0,0.75); }
      100% { transform: scale(1.15); box-shadow: 0 0 112px rgba(254,209,0,1); }
    }

    #footer-brand {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.55;
      text-align: center;
      margin-top: 2px;
    }

    /* optional: prevent rapid clicking while starting */
    body.starting #orb-container {
      pointer-events: none;
      opacity: 0.92;
    }
  </style>
</head>

<body class="idle">
  <div id="overlay">
    <div id="panel">
      <div id="headline">Press to start a conversation with our AI team member</div>

      <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
      </div>

      <div id="status-text"></div>

      <div id="hint">Click anywhere outside this box to go back to the website</div>

      <div id="footer-brand">A1 Professional Asphalt &amp; Concrete</div>
    </div>
  </div>

  <script>
    let pc = null;
    let localStream = null;
    let starting = false;

    const statusEl = document.getElementById('status-text');

    function setIdle() {
      document.body.className = 'idle';
      statusEl.textContent = "";
      starting = false;
    }

    function setStarting() {
      document.body.className = 'starting';
      statusEl.textContent = "STARTING…";
    }

    function setActive() {
      document.body.className = 'active';
      statusEl.textContent = "LISTENING…";
    }

    async function hardStop() {
      try {
        if (pc) {
          try { pc.close(); } catch {}
          pc = null;
        }
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()); } catch {}
          localStream = null;
        }
      } finally {
        setIdle();
      }
    }

    // Click outside panel to go back
    document.getElementById("overlay").addEventListener("click", async (e) => {
      if (e.target.id !== "overlay") return;
      await hardStop();

      // If embedded in a Webflow modal/iframe, notify parent to close
      try { window.parent.postMessage({ type: "voxtalk-close" }, "*"); } catch {}

      // If standalone tab/window, try close/back
      try { window.close(); } catch {}
      try { history.back(); } catch {}
    });

    async function toggleAssistant() {
      // Stop if running
      if (pc || starting) {
        await hardStop();
        return;
      }

      // Start (lock to prevent double start)
      starting = true;
      setStarting();

      try {
        // Get session token
        const r = await fetch('/session');
        const data = await r.json();

        // Create peer connection
        pc = new RTCPeerConnection();

        const audio = document.createElement("audio");
        audio.autoplay = true;

        pc.ontrack = (e) => {
          if (audio.srcObject !== e.streams[0]) {
            audio.srcObject = e.streams[0];
          }
        };

        // Mic
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        pc.addTrack(localStream.getTracks()[0]);

        // Offer/answer
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);

        const sdpResponse = await fetch(
          "https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17",
          {
            method: "POST",
            body: offer.sdp,
            headers: {
              Authorization: `Bearer ${data.client_secret.value}`,
              "Content-Type": "application/sdp"
            }
          }
        );

        const answer = { type: "answer", sdp: await sdpResponse.text() };
        await pc.setRemoteDescription(answer);

        // Now active
        setActive();

      } catch (err) {
        console.error(err);
        pc = null;
        if (localStream) {
          try { localStream.getTracks().forEach(t => t.stop()); } catch {}
          localStream = null;
        }
        document.body.className = 'idle';
        statusEl.textContent = "ERROR";
        starting = false;
      }
    }

    // initial state
    setIdle();
  </script>
</body>
</html>
