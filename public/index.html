<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Asphalt - AI Assistant</title>
    <style>
        /* ... existing styles ... */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #status-text {
            margin-bottom: 30px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            font-weight: 300;
            color: #ffcc00; 
            text-transform: uppercase;
        }

        /* The New Branding Footer */
        #footer-brand {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            color: #ffcc00;
            font-weight: 400;
            text-transform: uppercase;
            opacity: 0.8;
        }

        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
            transition: transform 0.3s ease;
            z-index: 5;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle, #ffcc00 0%, #e6b800 70%);
            box-shadow: 0 0 50px rgba(255, 204, 0, 0.4);
            z-index: 2;
        }

        #chat-log {
            position: absolute;
            bottom: 80px; /* Moved up to make room for footer */
            width: 80%;
            max-height: 100px;
            overflow-y: auto;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }
        /* ... animation styles ... */
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="toggleAssistant()">
        <div class="orb"></div>
        <div class="orb-active-ring"></div>
    </div>

    <div id="chat-log"></div>

    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        const chatLog = document.getElementById('chat-log');
        let isActive = false;

        // --- Joe's Personal Greeting ---
        function getJoeGreeting() {
            const now = new Date().getTime();
            const threeHours = 3 * 60 * 60 * 1000;
            const lastSeen = localStorage.getItem('voxTalk_lastSeen');
            
            localStorage.setItem('voxTalk_lastSeen', now);

            if (lastSeen && (now - lastSeen < threeHours)) {
                return null; 
            } 

            return "Hello, Joe. How can I help you today?";
        }

        // ... Rest of your toggleAssistant and appendLine logic ...
    </script>
</body>
</html>
