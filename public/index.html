<script>
    const chatLog = document.getElementById('chat-log');
    let isActive = false;
    let peerConnection = null;
    let dataChannel = null;

    // --- A1 Professional Asphalt Greeting Logic ---
    function getA1Greeting() {
        const now = new Date().getTime();
        const threeHours = 3 * 60 * 60 * 1000;
        const lastSeen = localStorage.getItem('voxTalk_lastSeen');
        
        localStorage.setItem('voxTalk_lastSeen', now);

        // If they were just here, stay quiet to not be annoying
        if (lastSeen && (now - lastSeen < threeHours)) {
            return null; 
        } 

        // The Professional Greeting you asked for
        return "Welcome to A1 Professional Asphalt. How can we help you with your paving or sealing project today?";
    }

    async function toggleAssistant() {
        if (isActive) {
            stopAssistant();
            return;
        }

        isActive = true;
        document.body.className = 'speaking';
        document.getElementById('status-text').textContent = "LISTENING...";

        try {
            // 1. Get the ephemeral token from your server
            const tokenResponse = await fetch('/session');
            const data = await tokenResponse.json();
            const EPHEMERAL_KEY = data.client_secret.value;

            // 2. Setup WebRTC Peer Connection
            peerConnection = new RTCPeerConnection();

            // Handle audio from the AI
            const audioEl = document.createElement("audio");
            audioEl.autoplay = true;
            peerConnection.ontrack = e => audioEl.srcObject = e.streams[0];

            // Add your microphone to the connection
            const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
            peerConnection.addTrack(ms.getTracks()[0]);

            // 3. Connect to OpenAI Realtime
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);

            const baseUrl = "https://api.openai.com/v1/realtime";
            const model = "gpt-4o-realtime-preview-2024-12-17";
            const sdpResponse = await fetch(`${baseUrl}?model=${model}`, {
                method: "POST",
                body: offer.sdp,
                headers: {
                    Authorization: `Bearer ${EPHEMERAL_KEY}`,
                    "Content-Type": "application/sdp"
                },
            });

            const answer = { type: "answer", sdp: await sdpResponse.text() };
            await peerConnection.setRemoteDescription(answer);

        } catch (err) {
            console.error("Connection failed:", err);
            stopAssistant();
        }
    }

    function stopAssistant() {
        isActive = false;
        document.body.className = 'idle';
        document.getElementById('status-text').textContent = "TALK TO OUR AI TEAM MEMBER";
        if (peerConnection) peerConnection.close();
    }

    window.onload = () => {
        const greetingText = getA1Greeting();
        if (greetingText) {
            appendLine("ai", greetingText);
            // If you want it to speak immediately on load, 
            // you'd trigger the toggleAssistant here.
        }
    };

    function appendLine(role, text) {
        const line = document.createElement('div');
        line.style.padding = "5px";
        line.textContent = `${role === 'ai' ? 'A1' : 'You'}: ${text}`;
        chatLog.appendChild(line);
        chatLog.scrollTop = chatLog.scrollHeight;
    }
</script>
