<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>A1 Brain</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100vh;
            padding: 8vh 0;
            /* Asphalt Depth: Lighter center fading to true black edges */
            background: radial-gradient(circle, #252525 0%, #000000 100%);
            color: #ffcc00; /* Traffic Yellow */
            font-family: 'Impact', 'Arial Narrow Bold', sans-serif;
            overflow: hidden;
            box-sizing: border-box;
        }

        #status-text {
            font-size: clamp(2rem, 8vw, 3.5rem); 
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin: 0;
        }

        #orb-container {
            width: 240px;
            height: 240px;
            cursor: pointer;
            position: relative;
        }

        .orb {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffcc00;
            /* High Intensity Glow */
            box-shadow: 0 0 70px rgba(255, 204, 0, 0.9);
        }

        body.active .orb {
            animation: pulse 1s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); box-shadow: 0 0 70px rgba(255, 204, 0, 0.9); }
            to { transform: scale(1.08); box-shadow: 0 0 100px rgba(255, 204, 0, 1); }
        }

        #footer-brand {
            font-size: clamp(1rem, 4vw, 1.8rem);
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.9;
        }
    </style>
</head>
<body class="idle">

    <div id="status-text">TALK TO OUR AI TEAM MEMBER</div>

    <div id="orb-container" onclick="startAssistant()">
        <div class="orb"></div>
    </div>

    <div id="footer-brand">A1 Professional Asphalt LLC</div>

    <script>
        let connected = false;
        async function startAssistant() {
            if (connected) return;
            connected = true;

            document.body.className = 'active';
            document.getElementById('status-text').textContent = "LISTENING...";

            try {
                const r = await fetch('/session');
                const data = await r.json();
                
                const pc = new RTCPeerConnection();
                const audio = document.createElement("audio");
                audio.autoplay = true;

                pc.ontrack = e => {
                    if (audio.srcObject !== e.streams[0]) {
                        audio.srcObject = e.streams[0];
                    }
                };

                const ms = await navigator.mediaDevices.getUserMedia({ audio: true });
                pc.addTrack(ms.getTracks()[0]);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                const sdpResponse = await fetch(`https://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-12-17`, {
                    method: "POST",
                    body: offer.sdp,
                    headers: { 
                        Authorization: `Bearer ${data.client_secret.value}`, 
                        "Content-Type": "application/sdp" 
                    }
                });

                await pc.setRemoteDescription({ type: "answer", sdp: await sdpResponse.text() });
            } catch (err) {
                connected = false;
                document.getElementById('status-text').textContent = "ERROR";
            }
        }
    </script>
</body>
</html>
