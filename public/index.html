<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 Brain</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #1a1a1a; /* Dark Asphalt */
            color: #ffcc00; /* Traffic Yellow */
            /* Elongated, clean font */
            font-family: 'Segoe UI', 'Impact', sans-serif; 
            overflow: hidden;
        }

        #status-text {
            margin-bottom: 40px;
            font-size: 1.5rem; /* Larger than footer */
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
        }

        #orb-container {
            position: relative;
            width: 250px;
            height: 250px;
            cursor: pointer;
        }

        .orb {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffcc00; /* Solid Traffic Yellow */
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
        }

        /* Pulsate only when active */
        body.speaking .orb {
            animation: pulse 1.2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.08); }
        }

        #footer-brand {
            position: absolute;
            bottom: 30px;
            font-size: 0.9rem; /* Smaller font */
            letter-spacing: 2px;
            opacity: 0.9;
            text-transform: uppercase;
        }
    </style>
</head>

</html>
