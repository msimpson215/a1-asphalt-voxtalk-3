<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AxonAI</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:transparent;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
}

#orb{
    width:280px;
    height:280px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:
        0 0 40px rgba(255,210,0,0.7),
        0 0 80px rgba(255,210,0,0.4);
    transition:transform .2s ease;
}

#orb:hover{
    transform:scale(1.03);
}
</style>
</head>

<body>

<img
    id="orb"
    src="/images/axon-orb.jpg"
    alt="AxonAI Orb"
/>

</body>
</html>
