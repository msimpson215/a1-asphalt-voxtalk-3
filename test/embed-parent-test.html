<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parent embed test (fixed openVox)</title>
  <style>
    #vox-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 9999; }
    #vox-overlay.open { display: flex; }
    #vox-iframe { display: none; position: fixed; inset: 0; width: 100%; height: 100%; border: none; z-index: 10001; }
  </style>
</head>
<body>
  <button id="open" type="button">Open AI (like hamburger menu)</button>
  <div id="vox-overlay">
    <iframe id="vox-iframe" src="http://localhost:3000/" allow="microphone *"></iframe>
  </div>
  <script>
    function openVox() {
      var o = document.getElementById('vox-overlay')
      o.classList.add('open')
      o.style.display = 'flex'
      var f = document.getElementById('vox-iframe')
      if (f) {
        f.style.display = 'block'
        try { f.contentWindow.postMessage({ type: 'voxtalk-start' }, '*') } catch (e) {}
      }
    }
    document.getElementById('open').onclick = openVox
  </script>
</body>
</html>
